<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雀神記帳王 Pro Max (全功能版)</title>
    <style>
        :root {
            --primary-red: #D32F2F;
            --gold: #FFD700;
            --soft-white: #FFF9F0;
            --win-green: #2E7D32;
            --lose-red: #C62828;
            --line-green: #06C755;
        }

        body {
            font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--soft-white);
            margin: 0; padding: 10px; color: #333;
            padding-bottom: 50px;
        }

        .card {
            background: white; border: 2px solid var(--gold);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary-red); text-align: center; margin-top: 0; }

        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }

        input {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }

        .dashboard {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 5px; text-align: center;
        }

        .player-score { padding: 10px 5px; border-radius: 8px; background: #f8f8f8; transition: all 0.3s; border: 2px solid transparent; }
        .score-val { font-weight: bold; font-size: 1.1em; }
        .plus { color: var(--win-green); }
        .minus { color: var(--lose-red); }

        /* 莊家閃爍提醒 */
        @keyframes blink {
            0% { background-color: #fff; }
            50% { background-color: #FFEB3B; border-color: var(--primary-red); }
            100% { background-color: #fff; }
        }
        .next-dealer-blink { animation: blink 1s linear infinite; }

        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        button { padding: 12px 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .btn-player { background: #eee; border: 1px solid #ddd; }
        .btn-player.active { background: var(--primary-red); color: white; border-color: var(--gold); }
        
        .btn-type { background: #eee; }
        .btn-type.active { background: #555; color: white; }

        .btn-main { background: var(--primary-red); color: white; grid-column: span 4; font-size: 18px; padding: 15px; margin-top: 10px; }
        .btn-line { background: var(--line-green); color: white; grid-column: span 4; margin-top: 5px; padding: 12px; font-size: 16px; display: none; }
        .btn-undo { background: #666; color: white; grid-column: span 4; margin-top: 5px; }
        .btn-reset-tai { background: #eee; color: #333; border: 1px solid #ccc; white-space: nowrap; }
        .btn-danger { background: #f44336; color: white; width: 100%; margin-top: 20px; padding: 10px; }

        .tag-group { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
        .tag { background: #fdf2f2; border: 1px solid var(--primary-red); padding: 5px 12px; border-radius: 20px; font-size: 13px; }

        .log-list { max-height: 250px; overflow-y: auto; font-size: 12px; border-top: 1px solid #eee; margin-top: 10px; }
        .log-item { padding: 10px 0; border-bottom: 1px solid #eee; line-height: 1.5; }
    </style>
</head>
<body>

    <h2>🧧 雀神記帳王 Pro Max</h2>

    <div class="card">
        <div class="settings-grid">
            <input type="text" id="p0_name" oninput="saveData(); syncUI();" placeholder="玩家 1" value="東">
            <input type="text" id="p1_name" oninput="saveData(); syncUI();" placeholder="玩家 2" value="南">
            <input type="text" id="p2_name" oninput="saveData(); syncUI();" placeholder="玩家 3" value="西">
            <input type="text" id="p3_name" oninput="saveData(); syncUI();" placeholder="玩家 4" value="北">
            <input type="number" id="base_money" oninput="saveData()" placeholder="底" value="100">
            <input type="number" id="tai_money" oninput="saveData()" placeholder="台" value="20">
        </div>
    </div>

    <div class="card dashboard" id="score_board"></div>

    <div class="card">
        <p>1. 當局莊家 / 連莊數</p>
        <div class="btn-group" id="dealer_select"></div>
        <input type="number" id="streak_count" value="0" oninput="saveData()">

        <p>2. 誰贏了？</p>
        <div class="btn-group" id="winner_select"></div>

        <p>3. 贏牌方式？</p>
        <div class="btn-group">
            <button class="btn-type active" id="type_self" onclick="setType('self', this)">自摸</button>
            <button class="btn-type" id="type_gun" onclick="setType('gun', this)">放槍</button>
        </div>

        <div id="loser_section" style="display:none;">
            <p>4. 誰放槍？</p>
            <div class="btn-group" id="loser_select"></div>
        </div>

        <p>5. 台數 (不含莊家加成)</p>
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
            <input type="number" id="tai_input" value="0" style="flex:1;">
            <button onclick="resetTai()" class="btn-reset-tai">台數歸零</button>
        </div>
        <div class="tag-group">
            <span class="tag" onclick="addTai(1)">門清+1</span><span class="tag" onclick="addTai(1)">平胡+1</span>
            <span class="tag" onclick="addTai(1)">花牌+1</span><span class="tag" onclick="addTai(2)">全求人+2</span>
            <span class="tag" onclick="addTai(4)">碰碰胡+4</span><span class="tag" onclick="addTai(4)">混一色+4</span>
            <span class="tag" onclick="addTai(8)">清一色+8</span><span class="tag" onclick="addTai(16)">天胡+16</span>
        </div>

        <div class="btn-group">
            <button class="btn-main" onclick="calculateResult()">確認送出並發送 LINE 🀄</button>
            <button id="line_btn" class="btn-line" onclick="openLineShare()">📢 手動轉傳戰報</button>
            <button class="btn-undo" onclick="undoLast()">回上一步 (撤銷)</button>
        </div>
        <button class="btn-danger" onclick="clearAllData()">🧨 結束這一將 (所有資料重置)</button>
    </div>

    <div class="card">
        <h3>對戰明細紀錄</h3>
        <div class="log-list" id="log_list"></div>
    </div>

<script>
    let players = [{id:0, score:0}, {id:1, score:0}, {id:2, score:0}, {id:3, score:0}];
    let history = [];
    let selectedDealer = 0, selectedWinner = 0, selectedLoser = null, currentType = 'self';
    let lastLineMsg = "";

    window.onload = function() { loadData(); syncUI(); };

    function getPlayerName(id) { return document.getElementById(`p${id}_name`).value || `玩家${id+1}`; }

    function saveData() {
        const data = { players, history, 
            names: [0,1,2,3].map(i => document.getElementById(`p${i}_name`).value),
            base: document.getElementById('base_money').value,
            tai: document.getElementById('tai_money').value,
            dealer: selectedDealer, streak: document.getElementById('streak_count').value
        };
        localStorage.setItem('mj_promax_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('mj_promax_data');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players; history = data.history;
            data.names.forEach((name, i) => document.getElementById(`p${i}_name`).value = name);
            document.getElementById('base_money').value = data.base;
            document.getElementById('tai_money').value = data.tai;
            selectedDealer = parseInt(data.dealer);
            document.getElementById('streak_count').value = data.streak;
            updateLog();
        }
    }

    function syncUI() { renderBoard(); renderPlayerBtns(); }

    function renderBoard() {
        document.getElementById('score_board').innerHTML = players.map(p => `
            <div class="player-score" id="board_p${p.id}">
                <div>${getPlayerName(p.id)}</div>
                <div class="score-val ${p.score >= 0 ? 'plus' : 'minus'}">${p.score}</div>
            </div>
        `).join('');
    }

    function renderPlayerBtns() {
        ['dealer_select', 'winner_select', 'loser_select'].forEach(groupId => {
            const container = document.getElementById(groupId);
            let activeId = (groupId === 'dealer_select') ? selectedDealer : (groupId === 'winner_select' ? selectedWinner : selectedLoser);
            container.innerHTML = players.map(p => `
                <button class="btn-player ${activeId === p.id ? 'active' : ''}" onclick="selectPlayer('${groupId}', ${p.id})">${getPlayerName(p.id)}</button>
            `).join('');
        });
    }

    function selectPlayer(groupId, id) {
        if(groupId === 'dealer_select') { selectedDealer = id; players.forEach(p => document.getElementById(`board_p${p.id}`).classList.remove('next-dealer-blink')); }
        if(groupId === 'winner_select') selectedWinner = id;
        if(groupId === 'loser_select') selectedLoser = id;
        saveData(); syncUI();
    }

    function setType(type, btn) { currentType = type; Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('loser_section').style.display = type === 'gun' ? 'block' : 'none'; }
    function addTai(n) { document.getElementById('tai_input').value = parseInt(document.getElementById('tai_input').value) + n; }
    function resetTai() { document.getElementById('tai_input').value = 0; }

    function calculateResult() {
        const base = parseInt(document.getElementById('base_money').value);
        const taiPrice = parseInt(document.getElementById('tai_money').value);
        const streak = parseInt(document.getElementById('streak_count').value);
        const taiCount = parseInt(document.getElementById('tai_input').value);
        const dealerExtraTai = (2 * streak) + 1;
        
        let roundResults = [0, 0, 0, 0];
        let detailLog = "";
        let lineMsg = "🀄【雀神戰報】\n";

        if (currentType === 'self') {
            players.forEach(p => {
                if (p.id !== selectedWinner) {
                    let totalTai = taiCount + ((selectedWinner === selectedDealer || p.id === selectedDealer) ? dealerExtraTai : 0);
                    let amt = base + (totalTai * taiPrice);
                    roundResults[p.id] -= amt; roundResults[selectedWinner] += amt;
                }
            });
            detailLog = `${getPlayerName(selectedWinner)} 自摸 (${taiCount}台)`;
        } else {
            if (selectedLoser === null || selectedLoser === selectedWinner) { alert("請選擇放槍者"); return; }
            let totalTai = taiCount + ((selectedWinner === selectedDealer || selectedLoser === selectedDealer) ? dealerExtraTai : 0);
            let amt = base + (totalTai * taiPrice);
            roundResults[selectedLoser] -= amt; roundResults[selectedWinner] += amt;
            detailLog = `${getPlayerName(selectedWinner)} 贏 ${getPlayerName(selectedLoser)} (${taiCount}台)`;
        }

        lineMsg += `結果：${detailLog}\n`;
        if(selectedWinner === selectedDealer || (currentType === 'gun' && selectedLoser === selectedDealer) || currentType === 'self') {
            lineMsg += `莊家連莊：+${dealerExtraTai}台\n`;
        }
        lineMsg += `──────────────\n💰 本局收付：\n`;
        players.forEach((p, idx) => { lineMsg += `${getPlayerName(idx)}：${roundResults[idx] > 0 ? '+' : ''}${roundResults[idx]}\n`; });
        lineMsg += `──────────────\n🏆 目前總戰績：\n`;
        players.forEach((p, idx) => { lineMsg += `${getPlayerName(idx)}：${p.score + roundResults[idx]}\n`; });
        
        lastLineMsg = lineMsg;

        const prevDealer = selectedDealer, prevStreak = streak;
        let nextDealer = selectedDealer, nextStreak = 0;
        if (selectedWinner === selectedDealer) { nextStreak = streak + 1; } 
        else { nextDealer = (selectedDealer + 1) % 4; setTimeout(() => document.getElementById(`board_p${nextDealer}`).classList.add('next-dealer-blink'), 100); }

        players.forEach((p, idx) => p.score += roundResults[idx]);
        history.push({ results: roundResults, log: detailLog, prevDealer, prevStreak, nextDealer, nextStreak, dealerExtra: (selectedWinner === selectedDealer || (currentType==='gun' && selectedLoser === selectedDealer) || (currentType==='self')) ? `含莊家${dealerExtraTai}台` : "" });

        document.getElementById('streak_count').value = nextStreak;
        selectedDealer = nextDealer;
        resetTai();
        saveData();
        updateLog();
        renderBoard();
        renderPlayerBtns();

        document.getElementById('line_btn').style.display = 'block';
        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(lineMsg);
    }

    function openLineShare() { window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(lastLineMsg); }

    function updateLog() {
        document.getElementById('log_list').innerHTML = history.slice().reverse().map(h => `
            <div class="log-item">
                <strong>${h.log}</strong> <span style="color:var(--primary-red)">${h.dealerExtra}</span><br>
                <span style="color:#666; font-size:11px;">${h.results.map((r, i) => getPlayerName(i) + (r >= 0 ? '+'+r : r)).join(' , ')}</span>
            </div>
        `).join('');
    }

    function undoLast() {
        if (history.length === 0) return;
        const last = history.pop();
        players.forEach((p, idx) => p.score -= last.results[idx]);
        selectedDealer = last.prevDealer;
        document.getElementById('streak_count').value = last.prevStreak;
        document.getElementById('line_btn').style.display = 'none';
        saveData(); syncUI(); updateLog();
    }

    function clearAllData() { if (confirm("確定要重置所有分數、紀錄與名字嗎？")) { localStorage.removeItem('mj_promax_data'); location.reload(); } }
</script>
</body>
</html>
