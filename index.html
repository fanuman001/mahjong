<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雀神記帳王 Pro Max (功能全開修復版)</title>
    <style>
        :root {
            --primary-red: #D32F2F;
            --gold: #FFD700;
            --soft-white: #FFF9F0;
            --win-green: #2E7D32;
            --lose-red: #C62828;
            --line-green: #06C755;
            --wind-blue: #1976D2;
        }

        body {
            font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--soft-white);
            margin: 0; padding: 10px; color: #333;
            padding-bottom: 60px;
        }

        .card {
            background: white; border: 2px solid var(--gold);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h2 { color: var(--primary-red); text-align: center; margin-top: 5px; margin-bottom: 15px; text-shadow: 1px 1px 0px var(--gold); }
        h3 { font-size: 16px; margin: 0 0 10px 0; border-left: 4px solid var(--primary-red); padding-left: 8px; }

        .settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .player-row { grid-column: span 4; display: flex; gap: 8px; align-items: center; background: #fefefe; padding: 5px; border-radius: 10px; border: 1px solid #eee; }
        input[type="text"], input[type="number"] { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; transition: border 0.3s; width: 100%; box-sizing: border-box; }
        
        select.wind-select { background: var(--wind-blue); color: white; border: none; border-radius: 8px; padding: 10px; font-weight: bold; width: 80px; font-size: 15px; cursor: pointer; }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
        .player-score { padding: 12px 5px; border-radius: 12px; background: #fff; border: 2px solid #eee; transition: all 0.3s; cursor: pointer; min-height: 80px; }
        .score-label { font-size: 11px; color: #777; margin-bottom: 4px; }
        .score-name { font-weight: bold; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .score-val { font-weight: 800; font-size: 1.2em; }
        .plus { color: var(--win-green); }
        .minus { color: var(--lose-red); }

        @keyframes blink {
            0% { background-color: #fff; }
            50% { background-color: #FFF9C4; border-color: var(--primary-red); transform: scale(1.02); }
            100% { background-color: #fff; }
        }
        .next-dealer-blink { animation: blink 1.2s ease-in-out infinite; box-shadow: 0 0 10px rgba(211, 47, 47, 0.3); }

        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        button { padding: 12px 5px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .btn-player { background: #f0f0f0; border: 1px solid #ddd; color: #555; }
        .btn-player.active { background: var(--primary-red); color: white; border-color: var(--gold); }
        .btn-type { background: #f0f0f0; border: 1px solid #ddd; }
        .btn-type.active { background: #444; color: white; }

        .btn-main { background: var(--primary-red); color: white; grid-column: span 4; font-size: 18px; padding: 16px; margin-top: 10px; }
        .btn-only-log { background: #607D8B; color: white; grid-column: span 4; padding: 12px; }
        .btn-line { background: var(--line-green); color: white; grid-column: span 4; padding: 12px; }
        .btn-undo { background: #9E9E9E; color: white; grid-column: span 4; margin-top: 5px; }
        .btn-danger { background: #EF5350; color: white; width: 100%; margin-top: 20px; padding: 12px; }

        .tai-section { background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px dashed #ccc; }
        .tai-note { font-size: 12px; color: var(--primary-red); font-weight: bold; margin-bottom: 5px; text-align: center; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
        .tag { background: white; border: 1.5px solid #ddd; padding: 8px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .tag:active { background: #D32F2F; color: white; }
        .tag-cat { width: 100%; font-size: 12px; color: #888; margin-top: 10px; border-bottom: 1px solid #eee; padding-bottom: 2px; font-weight: bold; }

        .log-list { max-height: 200px; overflow-y: auto; font-size: 13px; margin-top: 10px; background: #fafafa; border-radius: 8px; }
        .log-item { padding: 10px; border-bottom: 1px solid #eee; }

        #analysis_modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 88%; max-width: 400px; background: white; border-radius: 20px;
            padding: 25px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #modal_overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; backdrop-filter: blur(2px); }
    </style>
</head>
<body>

    <h2>🧧 雀神記帳王 Pro Max</h2>

    <div class="card">
        <h3>📍 玩家座位配置</h3>
        <div class="settings-grid">
            <div class="player-row"><select class="wind-select" id="p0_wind" onchange="handleWindChange(0)"></select><input type="text" id="p0_name" value="Julia" oninput="saveData(); syncUI();"></div>
            <div class="player-row"><select class="wind-select" id="p1_wind" onchange="handleWindChange(1)"></select><input type="text" id="p1_name" value="Ora" oninput="saveData(); syncUI();"></div>
            <div class="player-row"><select class="wind-select" id="p2_wind" onchange="handleWindChange(2)"></select><input type="text" id="p2_name" value="Eva" oninput="saveData(); syncUI();"></div>
            <div class="player-row"><select class="wind-select" id="p3_wind" onchange="handleWindChange(3)"></select><input type="text" id="p3_name" value="James" oninput="saveData(); syncUI();"></div>
            <div style="grid-column: span 2;"><label style="font-size:12px;">底 (元)</label><input type="number" id="base_money" value="100" oninput="saveData()"></div>
            <div style="grid-column: span 2;"><label style="font-size:12px;">台 (元)</label><input type="number" id="tai_money" value="20" oninput="saveData()"></div>
        </div>
    </div>

    <div class="card dashboard" id="score_board"></div>

    <div class="card">
        <h3>🀄 當局結算</h3>
        
        <p style="margin:5px 0; font-size:14px;">1. 誰是莊家？</p>
        <div class="btn-group" id="dealer_select"></div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <span style="font-size:14px;">連莊次數:</span>
            <input type="number" id="streak_count" value="0" style="width:80px;" oninput="saveData()">
        </div>

        <p style="margin:5px 0; font-size:14px;">2. 誰贏了？</p>
        <div class="btn-group" id="winner_select"></div>

        <p style="margin:5px 0; font-size:14px;">3. 方式 / 放槍者</p>
        <div class="btn-group">
            <button class="btn-type active" id="type_self" onclick="setType('self', this)">自摸 (三家付)</button>
            <button class="btn-type" id="type_gun" onclick="setType('gun', this)">放槍 (一家付)</button>
        </div>
        <div id="loser_section" style="display:none; margin-top:10px;">
            <p style="margin:5px 0; font-size:12px; color:var(--lose-red);">請選擇放槍者：</p>
            <div class="btn-group" id="loser_select"></div>
        </div>

        <div class="tai-section" style="margin-top:15px;">
            <div class="tai-note">⚠️ 自摸台數已自動計算 (不含莊家台)</div>
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                <span style="font-size:14px; font-weight:bold;">目前台數:</span>
                <input type="number" id="tai_input" value="0" style="flex:1; border:2px solid var(--primary-red); font-weight:bold; color:var(--primary-red); text-align:center;">
                <button onclick="document.getElementById('tai_input').value=0" style="background:#444; color:white; padding:5px 15px;">清零</button>
            </div>
            
            <div class="tag-cat">【基本台】</div>
            <div class="tag-group">
                <span class="tag" onclick="addTai(1)">門清 +1</span>
                <span class="tag" onclick="addTai(1)">平胡 +1</span>
                <span class="tag" onclick="addTai(1)">花牌 +1</span>
                <span class="tag" onclick="addTai(1)">三元牌 +1</span>
                <span class="tag" onclick="addTai(1)">圈風/底風 +1</span>
            </div>
            <div class="tag-cat">【進階台】</div>
            <div class="tag-group">
                <span class="tag" onclick="addTai(2)">全求人 +2</span>
                <span class="tag" onclick="addTai(2)">花槓 +2</span>
                <span class="tag" onclick="addTai(4)">碰碰胡 +4</span>
                <span class="tag" onclick="addTai(4)">小三元 +4</span>
                <span class="tag" onclick="addTai(4)">混一色 +4</span>
            </div>
            <div class="tag-cat">【大牌台】</div>
            <div class="tag-group">
                <span class="tag" onclick="addTai(8)">大三元 +8</span>
                <span class="tag" onclick="addTai(8)">小四喜 +8</span>
                <span class="tag" onclick="addTai(8)">清一色 +8</span>
                <span class="tag" onclick="addTai(16)">大四喜 +16</span>
                <span class="tag" onclick="addTai(16)">天/地胡 +16</span>
            </div>
        </div>

        <div class="btn-group" style="margin-top:15px;">
            <button class="btn-main" onclick="calculateResult(true)">確認送出並發 LINE 📤</button>
            <button class="btn-only-log" onclick="calculateResult(false)">僅紀錄 📝</button>
            <button class="btn-line" onclick="sendCurrentScore()">📢 傳送目前總分</button>
            <button class="btn-undo" id="undo_btn" onclick="undoLast()" style="display:none;">回上一步 (撤銷)</button>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <input type="password" id="admin_pwd" placeholder="解鎖管理(8)" oninput="checkPwd(this.value)" style="width:100px; text-align:center; font-size:12px;">
        </div>
        <button class="btn-danger" id="reset_btn" onclick="clearAllData()" style="display:none;">🧨 重置所有資料</button>
    </div>

    <div id="modal_overlay" onclick="closeAnalysis()"></div>
    <div id="analysis_modal">
        <h3 id="ana_name"></h3>
        <div id="ana_content"></div>
        <button onclick="closeAnalysis()" style="width:100%; margin-top:20px; padding:12px; background:#444; color:white; border-radius:10px;">關閉</button>
    </div>

    <div class="card">
        <h3>🕒 對戰紀錄</h3>
        <div class="log-list" id="log_list"></div>
    </div>

<script>
    let players = [{id:0, score:0}, {id:1, score:0}, {id:2, score:0}, {id:3, score:0}];
    let history = [];
    let winds = ["東", "南", "西", "北"];
    let selectedDealer = 0, selectedWinner = 0, selectedLoser = null, currentType = 'self';

    const WIND_OPTIONS = ["東", "南", "西", "北", "無"];

    // 核心：初始化
    window.onload = function() { 
        loadData(); 
        syncUI(); 
    };

    function getPlayerName(id) { 
        return document.getElementById(`p${id}_name`).value || `玩家${id+1}`; 
    }

    // 更新風位下拉選單
    function renderWindSelects() {
        for(let i=0; i<4; i++) {
            const select = document.getElementById(`p${i}_wind`);
            if(!select) continue;
            const currentWind = winds[i];
            select.innerHTML = WIND_OPTIONS.map(w => {
                const isUsed = winds.some((usedWind, idx) => usedWind === w && idx !== i && w !== "無");
                return `<option value="${w}" ${w === currentWind ? 'selected' : ''} ${isUsed ? 'disabled' : ''}>${w}</option>`;
            }).join('');
        }
    }

    function handleWindChange(idx) {
        winds[idx] = document.getElementById(`p${idx}_wind`).value;
        saveData();
        syncUI();
    }

    // 渲染總分看板
    function renderBoard() {
        const board = document.getElementById('score_board');
        if(!board) return;
        board.innerHTML = players.map(p => `
            <div class="player-score" id="board_p${p.id}" onclick="showAnalysis(${p.id})">
                <div class="score-label">${winds[p.id]}位</div>
                <div class="score-name">${getPlayerName(p.id)}</div>
                <div class="score-val ${p.score >= 0 ? 'plus' : 'minus'}">${p.score}</div>
            </div>
        `).join('');
    }

    // 渲染所有選擇按鈕 (莊家、贏家、輸家)
    function renderPlayerBtns() {
        const config = {
            'dealer_select': selectedDealer,
            'winner_select': selectedWinner,
            'loser_select': selectedLoser
        };
        for (const [gid, activeId] of Object.entries(config)) {
            const container = document.getElementById(gid);
            if (!container) continue;
            container.innerHTML = players.map(p => `
                <button class="btn-player ${activeId === p.id ? 'active' : ''}" onclick="selectPlayer('${gid}', ${p.id})">${getPlayerName(p.id)}</button>
            `).join('');
        }
    }

    // 同步所有 UI 組件
    function syncUI() {
        renderWindSelects();
        renderBoard();
        renderPlayerBtns();
        updateLog();
    }

    function selectPlayer(gid, id) {
        if(gid==='dealer_select') {
            selectedDealer = id;
            players.forEach(p => {
                const el = document.getElementById(`board_p${p.id}`);
                if(el) el.classList.remove('next-dealer-blink');
            });
        }
        if(gid==='winner_select') selectedWinner = id;
        if(gid==='loser_select') selectedLoser = id;
        saveData();
        syncUI();
    }

    function setType(t, b) { 
        currentType = t; 
        Array.from(b.parentElement.children).forEach(x => x.classList.remove('active')); 
        b.classList.add('active'); 
        document.getElementById('loser_section').style.display = t === 'gun' ? 'block' : 'none'; 
    }

    function addTai(n) { 
        const input = document.getElementById('tai_input');
        input.value = parseInt(input.value) + n; 
    }

    function calculateResult(isSendLine) {
        const base = parseInt(document.getElementById('base_money').value) || 0;
        const taiPrice = parseInt(document.getElementById('tai_money').value) || 0;
        const streak = parseInt(document.getElementById('streak_count').value) || 0;
        const taiCount = parseInt(document.getElementById('tai_input').value) || 0;
        
        const dealerExtraTai = (2 * streak) + 1;
        let roundResults = [0, 0, 0, 0];
        let detailLog = "";

        if (currentType === 'self') {
            players.forEach(p => {
                if (p.id !== selectedWinner) {
                    let totalTai = taiCount + ((selectedWinner === selectedDealer || p.id === selectedDealer) ? dealerExtraTai : 0);
                    let amt = base + (totalTai * taiPrice);
                    roundResults[p.id] -= amt; roundResults[selectedWinner] += amt;
                }
            });
            detailLog = `${getPlayerName(selectedWinner)} 自摸 (${taiCount}台)`;
        } else {
            if (selectedLoser === null || selectedLoser === selectedWinner) { alert("請選擇放槍者"); return; }
            let totalTai = taiCount + ((selectedWinner === selectedDealer || selectedLoser === selectedDealer) ? dealerExtraTai : 0);
            let amt = base + (totalTai * taiPrice);
            roundResults[selectedLoser] -= amt; roundResults[selectedWinner] += amt;
            detailLog = `${getPlayerName(selectedWinner)} 贏 ${getPlayerName(selectedLoser)} (${taiCount}台)`;
        }

        let nextDealer = selectedDealer, nextStreak = 0;
        if (selectedWinner === selectedDealer) { 
            nextStreak = streak + 1; 
        } else {
            nextDealer = (selectedDealer + 1) % 4;
            setTimeout(() => { 
                const el = document.getElementById(`board_p${nextDealer}`);
                if(el) el.classList.add('next-dealer-blink');
            }, 100);
        }

        const logEntry = { results: roundResults, log: detailLog, winner: selectedWinner, loser: (currentType==='gun'?selectedLoser:null), isSelf: (currentType==='self'), streak: streak, prevDealer: selectedDealer, nextDealer, nextStreak };
        history.push(logEntry);
        players.forEach((p, i) => p.score += roundResults[i]);
        
        selectedDealer = nextDealer;
        document.getElementById('streak_count').value = nextStreak;
        document.getElementById('tai_input').value = 0;
        
        saveData();
        syncUI();

        if (isSendLine) {
            let msg = `🀄【雀神戰報】\n結果：${detailLog}\n──────────\n🏆 目前總分：\n` + players.map((p, i) => `${getPlayerName(i)}：${p.score}`).join('\n');
            window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(msg);
        }
    }

    function sendCurrentScore() {
        let msg = `📊【目前最新總計】\n──────────\n` + players.map((p, i) => `${getPlayerName(i)}：${p.score}`).join('\n');
        window.location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(msg);
    }

    function showAnalysis(id) {
        const name = getPlayerName(id);
        const wins = history.filter(h => h.winner === id);
        const losses = history.filter(h => h.loser === id);
        const selfDraws = wins.filter(h => h.isSelf).length;
        
        document.getElementById('ana_name').innerText = `📊 ${name} 數據分析`;
        document.getElementById('ana_content').innerHTML = `
            總計積分：${players[id].score}<br>
            自摸次數：${selfDraws} 次<br>
            被胡/放槍：${losses.length} 次
        `;
        document.getElementById('analysis_modal').style.display = 'block';
        document.getElementById('modal_overlay').style.display = 'block';
    }

    function closeAnalysis() { 
        document.getElementById('analysis_modal').style.display = 'none'; 
        document.getElementById('modal_overlay').style.display = 'none'; 
    }

    function checkPwd(val) {
        const isAuth = (val === "8");
        document.getElementById('undo_btn').style.display = isAuth ? 'block' : 'none';
        document.getElementById('reset_btn').style.display = isAuth ? 'block' : 'none';
    }

    function undoLast() { 
        if (history.length === 0) return; 
        const last = history.pop(); 
        players.forEach((p, i) => p.score -= last.results[i]); 
        selectedDealer = last.prevDealer; 
        document.getElementById('streak_count').value = last.streak; 
        saveData(); 
        syncUI(); 
    }

    function clearAllData() { 
        if (confirm("確定清空嗎？")) { 
            localStorage.removeItem('mj_v5_pro_final'); 
            location.reload(); 
        } 
    }

    function saveData() {
        const data = { 
            players, history, 
            names: [0,1,2,3].map(i => document.getElementById(`p${i}_name`).value), 
            base: document.getElementById('base_money').value, 
            tai: document.getElementById('tai_money').value, 
            dealer: selectedDealer, 
            streak: document.getElementById('streak_count').value, 
            winds 
        };
        localStorage.setItem('mj_v5_pro_final', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('mj_v5_pro_final');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players; history = data.history;
            data.names.forEach((n, i) => document.getElementById(`p${i}_name`).value = n);
            document.getElementById('base_money').value = data.base; 
            document.getElementById('t
